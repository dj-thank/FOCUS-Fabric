model = "gpt-5.6-sol"
model_reasoning_effort = "xhigh"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
allow_login_shell = false

[windows]
sandbox = "elevated"

[features]
multi_agent = true
goals = true
hooks = false
memories = false

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800
interrupt_message = true
