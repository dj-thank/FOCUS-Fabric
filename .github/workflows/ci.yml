name: ci
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  cpu-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e '.[dev]'
      - run: make gate
      - run: python scripts/autonomy/holdout_evaluator.py --source src --seed 17072026 --cases 1 --output /tmp/holdout.json
